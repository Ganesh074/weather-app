<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="status-bar">
      <span id="clock">9:41</span>
      <span>●●●</span>
    </div>
    <div class="screen">

      <div class="top-bar">
        <div class="location-label">
          📍 <span id="locationLabel">Search a city</span>
        </div>
        <div class="search-toggle" id="searchToggle">🔍</div>
      </div>

      <div class="search-bar" id="searchBar">
        <input type="text" id="cityInput" placeholder="Search city..." />
        <button id="searchBtn">Go</button>
      </div>

      <div id="weatherContent" class="hidden">
        <div class="city-name" id="cityName">--</div>
        <div class="country" id="countryName">--</div>
        <div class="big-weather">
          <div class="big-temp"><span id="temp">--</span>°</div>
          <div class="big-icon" id="weatherIcon">🌤️</div>
        </div>
        <div class="desc" id="description">--</div>
        <div class="divider"></div>
        <div class="details-grid">
          <div class="detail">
            <div class="d-icon">💧</div>
            <span class="d-val" id="humidity">--%</span>
            <span class="d-lbl">Humidity</span>
          </div>
          <div class="detail">
            <div class="d-icon">💨</div>
            <span class="d-val" id="wind">-- km/h</span>
            <span class="d-lbl">Wind</span>
          </div>
          <div class="detail">
            <div class="d-icon">🌡️</div>
            <span class="d-val" id="feelsLike">--°</span>
            <span class="d-lbl">Feels Like</span>
          </div>
        </div>
      </div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">🌍</div>
        <p>Search any city to see weather</p>
      </div>

      <p class="error" id="errorMsg"></p>

    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
