<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Header -->
    <h1>Weather App 🌤️</h1>
    <p class="subtitle">search any city in the world</p>

    <!-- Search Box -->
    <div class="search-section">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Enter city name..."
      />
      <button id="searchBtn">Search</button>
    </div>

    <!-- Error Message -->
    <p class="error" id="errorMsg"></p>

    <!-- Weather Card -->
    <div class="weather-card" id="weatherCard">

      <div class="weather-top">
        <div>
          <h2 id="cityName">-</h2>
          <p id="countryName" class="country">-</p>
        </div>
        <div class="weather-icon" id="weatherIcon">🌤️</div>
      </div>

      <div class="temperature">
        <span id="temp">--</span>
        <span class="unit">°C</span>
      </div>

      <p class="description" id="description">-</p>

      <div class="details">
        <div class="detail-card">
          <span class="detail-icon">💧</span>
          <span class="detail-value" id="humidity">--%</span>
          <span class="detail-label">Humidity</span>
        </div>
        <div class="detail-card">
          <span class="detail-icon">💨</span>
          <span class="detail-value" id="wind">-- km/h</span>
          <span class="detail-label">Wind</span>
        </div>
        <div class="detail-card">
          <span class="detail-icon">🌡️</span>
          <span class="detail-value" id="feelsLike">--°C</span>
          <span class="detail-label">Feels Like</span>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
